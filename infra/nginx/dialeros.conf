# DialerOS — nginx reverse proxy
#
# Drop into /etc/nginx/sites-available/dialeros and symlink into
# sites-enabled. Replace `server_name _;` with your real domain
# before you enable TLS via certbot.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Generous body size for CSV lead list uploads (Phase 2)
  client_max_body_size 50M;

  # SSE / WebSocket-friendly defaults
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;

  # Don't buffer SSE streams (provisioning logs come live).
  proxy_buffering off;
  proxy_cache off;
  proxy_read_timeout 1h;
  proxy_send_timeout 1h;

  location / {
    proxy_pass http://127.0.0.1:1111;
  }
}

# When you have a domain + TLS via certbot, certbot will append a
# second `server` block listening on 443 with the cert paths and a
# redirect from this :80 block.
