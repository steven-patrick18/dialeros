#!KAMAILIO
#
# Iter 114 — minimal DialerOS inbound front-door.
#
# Architecture:
#
#                  +----------- PSTN trunk (carrier) -----+
#                  |                                       |
#                  v                                       |
#   [ Kamailio :5060 UDP/TCP ]                             |
#                  |                                       |
#                  | HTTP POST /api/internal/inbound-route |
#                  v                                       |
#   [ DialerOS admin-gui :3000 ] -- decides --> {action: forward, target: sip:1001@FS}
#                  |                                       |
#                  v                                       |
#   [ FreeSWITCH :5080 internal profile ]                  |
#                  |                                       |
#                  +---- bridges to user/<ext> ------------+
#
# Kamailio handles:
#   - Public-internet SIP transport (PSTN trunks register / send INVITE
#     here; FS never sees the public side)
#   - Source IP ACL against `permissions` (mod_permissions)
#   - HTTP_ASYNC lookup to DialerOS for per-call routing decision
#   - r_uri rewrite to the FS bridge target returned by DialerOS
#
# FreeSWITCH still does:
#   - SDP / media handling (RTP, codec negotiation)
#   - WSS agent registration on :7443 (browser softphones)
#   - bgapi originate for outbound (unchanged)
#   - record_session for inbound (new — iter 115 wires)

####### Global Parameters #########

debug=2
log_stderror=no
fork=yes
children=8

memdbg=5
memlog=5

# Listen on the public interface for PSTN INVITE.
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# Internal-only port for FS to send replies back (not used here yet
# but reserved for iter 115 attended-transfer + register flows).
listen=udp:127.0.0.1:5070

####### Modules Section ########

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "permissions.so"
loadmodule "http_async_client.so"
loadmodule "jansson.so"
loadmodule "uac.so"

# Trusted source IPs (PSTN trunks) — DialerOS admin pushes this list
# from the Carriers page in iter 115. For now, hand-curate
# /etc/kamailio/trusted.list or use the file_trusted setting on
# module permissions.
modparam("permissions", "db_url", "")
modparam("permissions", "trusted_table", "trusted")

# Async HTTP — non-blocking calls to DialerOS so a slow Node process
# doesn't tie up a Kamailio worker for the entire ring period.
modparam("http_async_client", "workers", 2)
modparam("http_async_client", "connection_timeout", 1500)

####### Routing Logic ########

# Main entry — every received SIP message lands here.
request_route {
    # Basic sanity. mod_sanity runs default checks (Content-Length,
    # CSeq, From / To presence). Reject malformed at the edge.
    if (!sanity_check()) {
        xlog("L_WARN", "[$ci] sanity_check failed, drop\n");
        exit;
    }

    # Max-forwards loop guard.
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # We only handle the initial INVITE here — in-dialog requests
    # (ACK, BYE, re-INVITE) follow Route headers via mod_rr.
    if (has_totag()) {
        route(WITHIN_DLG);
        exit;
    }

    # ACK without to-tag is for a request we never sent forward —
    # just drop (RFC 3261 §17.1.1.3).
    if (is_method("ACK")) {
        exit;
    }

    # OPTIONS keep-alive from carriers — answer 200 OK directly so we
    # don't burn cycles on the lookup path.
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("INVITE")) {
        route(INBOUND);
        exit;
    }

    # Anything else (REGISTER, NOTIFY, SUBSCRIBE, etc.) — refuse.
    # Iter 115 will permit REGISTER for hard phones; for now reject
    # to surface unexpected traffic.
    sl_send_reply("405", "Method Not Allowed");
    exit;
}

route[INBOUND] {
    # Source ACL — only known PSTN trunks may push INVITE at us.
    # Comment out for first-time testing if you don't have the
    # trusted list populated yet (NOT recommended in production).
    if (!allow_trusted("$si", "$proto")) {
        xlog("L_WARN", "[$ci] untrusted source $si:$sp drop\n");
        sl_send_reply("403", "Untrusted source");
        exit;
    }

    # Build the routing request — POST JSON with to + from + Call-ID
    # to the DialerOS admin-gui. The async client fires the request
    # and yields the worker; ROUTE_DECISION runs when the response
    # arrives.
    $var(payload) = "{\"to\":\"" + $rU + "\",\"from\":\"" + $fU + "\",\"call_id\":\"" + $ci + "\"}";

    # http_async_query takes URL + reply_route. The auth token is
    # sent via X-Inbound-Token; DialerOS rejects requests without
    # the matching KAMAILIO_INBOUND_TOKEN.
    http_async_client_query(
        "http://127.0.0.1:3000/api/internal/inbound-route",
        "$var(payload)",
        "ROUTE_DECISION"
    );

    # NB: we DO NOT exit here. The async client suspends the
    # transaction and resumes in ROUTE_DECISION below.
}

route[ROUTE_DECISION] {
    # $http_rb is the response body. Parse JSON to pull out
    # action + target_uri.
    if ($http_rs != "200") {
        xlog("L_ERR", "[$ci] dialeros lookup HTTP $http_rs, drop\n");
        sl_send_reply("503", "Routing service unavailable");
        exit;
    }

    jansson_get("action", $http_rb, "$var(action)");
    jansson_get("target_uri", $http_rb, "$var(target_uri)");
    jansson_get("reason", $http_rb, "$var(reason)");
    jansson_get("classification", $http_rb, "$var(classification)");

    xlog("L_INFO", "[$ci] route decision: action=$var(action) target=$var(target_uri) why=$var(classification)/$var(reason)\n");

    if ($var(action) == "forward" && $var(target_uri) != "<null>") {
        # Rewrite r-uri to FS internal bridge target, relay.
        $du = $var(target_uri);
        t_relay();
        exit;
    }
    if ($var(action) == "queue") {
        # iter 115 — park the call in mod_park, play hold music,
        # poll DialerOS for an available agent every N seconds.
        # For now: 480 Temporarily Unavailable. Carrier will hear
        # busy / fail to next route.
        sl_send_reply("480", "All agents busy");
        exit;
    }
    # reject / unknown / parse failure — refuse politely.
    sl_send_reply("404", "DID not found");
    exit;
}

route[WITHIN_DLG] {
    # In-dialog requests: follow Route header via mod_rr.
    if (loose_route()) {
        t_relay();
        exit;
    }
    sl_send_reply("404", "Not here");
    exit;
}
